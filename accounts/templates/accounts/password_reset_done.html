
{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">

        <!-- LEFT -->
        <div class="auth-form-panel">
            <div class="auth-card">

                <div class="auth-icon-box success">
                    ✓
                </div>

                <h2>Check Your Email</h2>

                <p class="auth-subtitle">
                    We have sent a password reset link to your email.
                    Please check inbox/spam and follow the instructions.
                </p>

                <div class="success-alert">
                    If you don't see the email, check Spam or Junk folder.
                </div>

                <a href="{% url 'login' %}" class="auth-link">
                    ← Back to Login
                </a>

            </div>
        </div>

        <!-- RIGHT -->
        <div class="auth-illustration">
            <img src="{% static 'images/email-sent-ill.png' %}" alt="">
        </div>

    </div>
</div>

<style>
.auth-page{
    min-height: calc(100vh - 160px);
    background:#f5f8ff;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.auth-container{
    width:1200px;
    max-width:92%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
    align-items:center;
}

.auth-form-panel{
    display:flex;
    justify-content:center;
}

.auth-card{
    width:100%;
    max-width:600px;
    background:#fff;
    padding:50px;
    border-radius:24px;
    box-shadow:0 10px 40px rgba(0,0,0,.08);
}

.auth-icon-box{
    width:80px;
    height:80px;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:38px;
    font-weight:bold;
    margin-bottom:25px;
}

.success{
    background:#dcfce7;
    color:#16a34a;
}

.auth-card h2{
    font-size:46px;
    font-weight:800;
    color:#071b4d;
    margin-bottom:16px;
}

.auth-subtitle{
    font-size:18px;
    line-height:1.7;
    color:#64748b;
    margin-bottom:25px;
}

.success-alert{
    background:#eff6ff;
    color:#1d4ed8;
    border-left:4px solid #2563eb;
    padding:18px 20px;
    border-radius:14px;
    margin-bottom:30px;
    font-size:16px;
}

.auth-link{
    display:inline-block;
    text-decoration:none;
    color:#2563eb;
    font-size:18px;
    font-weight:700;
    transition:.3s;
}

.auth-link:hover{
    transform:translateX(-4px);
}

.auth-illustration{
    display:flex;
    justify-content:center;
    align-items:center;
    width:520px;
    height:520px;
    margin:auto;
    background:linear-gradient(135deg,#dbeafe,#eff6ff);
    border-radius:50%;
}

.auth-illustration img{
    width:430px;
    height:430px;
    object-fit:cover;
    border-radius:50%;
    border:8px solid white;
    box-shadow:0 15px 40px rgba(0,0,0,.12);
}

@media (max-width: 992px){
    .auth-container{
        grid-template-columns:1fr;
    }

    .auth-illustration{
        display:none;
    }

    .auth-card{
        padding:30px;
    }

    .auth-card h2{
        font-size:34px;
    }
}
</style>
{% endblock %}
