
{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="success-page">
    <div class="success-card">

       
        <div class="success-image">
            <img src="{% static 'images/reset-success-ill.png' %}" alt="Success">
        </div>

        
        <h1>Password Reset Successful</h1>

        <p>
            Your password has been successfully updated.
            You can now log in to your account with your new credentials.
        </p>

        <a href="{% url 'login' %}" class="login-btn">
            Continue to Login
        </a>

    </div>
</section>

<style>

.success-page{
    min-height: calc(100vh - 160px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px 20px;
    background: linear-gradient(135deg,#edf6ff,#dfeeff,#edf6ff);
}


.success-card{
    width:100%;
    max-width:760px;
    text-align:center;
    padding:20px;
}


.success-image{
    margin-bottom:20px;
}

.success-image img{
    width:220px;     
    max-width:80%;
}


.success-card h1{
    font-size:42px; 
    font-weight:800;
    color:#08245c;
    margin-bottom:14px;
}


.success-card p{
    font-size:18px;   
    line-height:1.7;
    color:#475569;
    max-width:620px;
    margin:0 auto 30px auto;
}

/* Button */
.login-btn{
    display:inline-flex;
    justify-content:center;
    align-items:center;
    width:240px;      
    height:58px;     
    border-radius:40px;
    text-decoration:none;
    font-size:20px;  
    font-weight:700;
    color:white;
    background:linear-gradient(90deg,#2296ff,#0a78eb);
    box-shadow:0 10px 20px rgba(34,150,255,.22);
}


@media(max-width:768px){
    .success-image img{
        width:170px;
    }

    .success-card h1{
        font-size:32px;
    }

    .success-card p{
        font-size:16px;
    }

    .login-btn{
        width:210px;
        height:52px;
        font-size:17px;
    }
}

/* Mobile */
@media(max-width:480px){
    .success-image img{
        width:130px;
    }

    .success-card h1{
        font-size:26px;
    }

    .success-card p{
        font-size:14px;
        padding:0 10px;
    }

    .login-btn{
        width:180px;
        height:46px;
        font-size:15px;
    }
}
</style>
{% endblock %}
