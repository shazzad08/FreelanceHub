{% extends 'base.html' %}
{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-4">

                    <h3 class="fw-bold mb-3">
                        Submit Work
                    </h3>

                    <p class="text-muted">

                        {{ project.title }}

                    </p>

                    <form
                        method="POST"
                        enctype="multipart/form-data"
                    >

                        {% csrf_token %}

                        <div class="mb-3">

                            <label>

                                Message

                            </label>

                            {{ form.message }}

                        </div>

                        <div class="mb-4">

                            {{ form.file }}

                        </div>

                        <button
                            class="btn btn-dark w-100"
                        >

                            Submit Project

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
